apiVersion: v2
appVersion: 26.1.0
description: A Helm chart for Digital.ai Deploy
name: digitalai-deploy
version: 26.1.0
kubeVersion: ">= 1.20.0-0 < 1.36.0-0"
sources:
  - https://github.com/digital-ai/deploy-helm-chart
  - https://github.com/xebialabs/xl-deploy
home: https://github.com/digital-ai/deploy-helm-chart
keywords:
  - Digital.ai
  - Deploy
  - DAI
  - DAID
  - Xebia
  - XLD

dependencies:

  - name: common
    repository: https://charts.bitnami.com/bitnami
    tags:
      - bitnami-common
    version: 2.x.x


  - name: postgresql
    version: 16.7.27
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.install

  - name: rabbitmq
    version: 16.0.14
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.install
